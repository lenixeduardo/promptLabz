        "name": "O que e engenharia de prompts?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Engenharia de prompts e a habilidade de formular instrucoes claras e eficazes para modelos de linguagem como ChatGPT, Claude e Gemini, a fim de obter respostas mais precisas, uteis e criativas. E uma das habilidades mais valorizadas na era da IA generativa."
        }
      },
      {
        "@type": "Question",
        "name": "PromptLabz e gratuito?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Sim, o PromptLabz oferece plano gratuito com acesso as licoes iniciais, laboratorio de prompts e trilha de aprendizado. O plano Premium desbloqueia todo o conteudo avancado, conquistas exclusivas e recursos ilimitados."
        }
      },
      {
        "@type": "Question",
        "name": "Para quem e o PromptLabz?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "O PromptLabz e ideal para estudantes, criadores de conteudo, profissionais de marketing, desenvolvedores e qualquer pessoa que queira aprender a usar IA de forma pratica. As licoes sao gamificadas e o progresso e personalizado, sem exigir experiencia previa."
        }
      },
      {
        "@type": "Question",
        "name": "Como funciona a gamificacao do PromptLabz?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "O PromptLabz usa um sistema de vidas, XP (pontos de experiencia), conquistas e trilha progressiva similar ao Duolingo. Voce ganha XP ao completar licoes, sobe de nivel e desbloqueia novos conteudos. O sistema de vidas incentiva o estudo diario."
        }
      },
      {
        "@type": "Question",
        "name": "Quanto tempo leva para aprender engenharia de prompts?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Com o PromptLabz, voce consegue dominar os fundamentos em 2 a 4 semanas estudando 10 a 15 minutos por dia. A trilha completa do zero ao avancado leva de 4 a 8 semanas, dependendo do seu ritmo."
        }
      },
      {
        "@type": "Question",
        "name": "O PromptLabz funciona para ChatGPT, Claude e Gemini?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Sim! As tecnicas ensinadas no PromptLabz sao aplicaveis a todos os principais modelos de linguagem: ChatGPT (OpenAI), Claude (Anthropic), Gemini (Google) e outros. Os principios de engenharia de prompts sao transferiveis entre diferentes IAs."
        }
      }
    ]
