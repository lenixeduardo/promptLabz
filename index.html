<!doctype html>

<head>
  <meta charset="UTF-8" />

  <!-- Google Fonts — preconnect evita bloqueio de render -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,700&display=swap" media="print" onload="this.media='all'" />

  <!-- Security Headers -->

    "inLanguage": "pt-BR",

        "@type": "Offer",

    "audience": {

    "publisher": {
      "@type": "Organization",
      "name": "PromptLabz",
      "url": "https://promptlabz.vercel.app"
    }
  }

  <!-- Structured Data: Organization -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",

    "url": "https://promptlabz.vercel.app",

  }
  </script>

  <!-- Structured Data: Course -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Course",
    "name": "Engenharia de Prompts do Zero ao Avançado",
    "description": "Trilha de aprendizado completa sobre engenharia de prompts e IA generativa. Do básico ao avançado, com gamificação e lições interativas.",

      "@type": "Organization",

      "url": "https://promptlabz.vercel.app"
    },
    "url": "https://promptlabz.vercel.app/learn",

    "offers": {
      "@type": "Offer",
      "price": "0",
      "priceCurrency": "BRL",
      "category": "free"
    }

  <!-- Structured Data: FAQPage -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [
      {
        "@type": "Question",
        "name": "O que é engenharia de prompts?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Engenharia de prompts é a habilidade de formular instruções claras e eficazes para modelos de linguagem como ChatGPT, Claude e Gemini, a fim de obter respostas mais precisas e úteis."
        }
      },
      {
        "@type": "Question",
        "name": "PromptLabz é gratuito?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "Sim, o PromptLabz oferece um plano gratuito com acesso às lições iniciais, laboratório de prompts e trilha de aprendizado. O plano Premium desbloqueia todo o conteúdo avançado."
        }
      },
      {
        "@type": "Question",
        "name": "Para quem é o PromptLabz?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "O PromptLabz é ideal para estudantes, criadores de conteúdo, profissionais e iniciantes que querem aprender a usar IA de forma prática, com lições gamificadas e progresso personalizado."
        }
      },
      {
        "@type": "Question",
        "name": "Como funciona a gamificação do PromptLabz?",
        "acceptedAnswer": {
          "@type": "Answer",
          "text": "O PromptLabz usa um sistema de vidas, XP (pontos de experiência), conquistas e trilha progressiva similar ao Duolingo. Você ganha XP ao completar lições, sobe de nível e desbloqueia novos conteúdos."
        }
      }
    ]
  }
  </script>
