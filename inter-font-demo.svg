<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
      body { font-family: Inter, sans-serif; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="800" fill="#F9FBFA"/>
  
  <!-- Header -->
  <rect width="1200" height="80" fill="#2B5D3A"/>
  <text x="40" y="52" font-family="Inter, sans-serif" font-size="32" font-weight="700" fill="white">
    PromptLabz
  </text>
  
  <!-- Hero Section -->
  <text x="40" y="160" font-family="Inter, sans-serif" font-size="48" font-weight="700" fill="#2B5D3A">
    Seu Laboratório de Ideias com IA
  </text>
  
  <text x="40" y="220" font-family="Inter, sans-serif" font-size="20" font-weight="400" fill="#5A5A5A">
    Pratique prompts e habilidades de IA com lições interativas, gamificação e progresso personalizado.
  </text>
  
  <!-- Feature Cards -->
  <g id="card1">
    <rect x="40" y="280" width="350" height="180" rx="16" fill="white" stroke="#E8E8E8" stroke-width="1"/>
    <text x="60" y="320" font-family="Inter, sans-serif" font-size="24" font-weight="600" fill="#2B5D3A">
      ✨ Prompts Interativos
    </text>
    <text x="60" y="365" font-family="Inter, sans-serif" font-size="16" font-weight="400" fill="#666666">
      Aprenda técnicas avançadas de engenharia de prompts com exercícios práticos.
    </text>
  </g>
  
  <g id="card2">
    <rect x="425" y="280" width="350" height="180" rx="16" fill="white" stroke="#E8E8E8" stroke-width="1"/>
    <text x="445" y="320" font-family="Inter, sans-serif" font-size="24" font-weight="600" fill="#2B5D3A">
      🎮 Gamificação
    </text>
    <text x="445" y="365" font-family="Inter, sans-serif" font-size="16" font-weight="400" fill="#666666">
      Ganhe pontos, badges e acompanhe seu progresso em tempo real.
    </text>
  </g>
  
  <g id="card3">
    <rect x="810" y="280" width="350" height="180" rx="16" fill="white" stroke="#E8E8E8" stroke-width="1"/>
    <text x="830" y="320" font-family="Inter, sans-serif" font-size="24" font-weight="600" fill="#2B5D3A">
      📊 Análise de IA
    </text>
    <text x="830" y="365" font-family="Inter, sans-serif" font-size="16" font-weight="400" fill="#666666">
      Entenda como os modelos de IA interpretam seus prompts.
    </text>
  </g>
  
  <!-- Font Info -->
  <rect x="40" y="520" width="1120" height="200" rx="16" fill="#F0F4F2" stroke="#C5E5D0" stroke-width="2"/>
  <text x="60" y="560" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#2B5D3A">
    ✓ Fonte Inter Aplicada
  </text>
  <text x="60" y="600" font-family="Inter, sans-serif" font-size="16" font-weight="600" fill="#2B5D3A">
    Alterações Realizadas:
  </text>
  <text x="80" y="635" font-family="Inter, sans-serif" font-size="14" font-weight="400" fill="#444444">
    • Importação de fonte: DM Sans → Inter
  </text>
  <text x="80" y="660" font-family="Inter, sans-serif" font-size="14" font-weight="400" fill="#444444">
    • Tailwind Config: fontFamily.sans atualizada para Inter
  </text>
  <text x="80" y="685" font-family="Inter, sans-serif" font-size="14" font-weight="400" fill="#444444">
    • Pesos: 400, 500, 600, 700, 800 (todos disponíveis)
  </text>
  
  <!-- Footer -->
  <text x="40" y="770" font-family="Inter, sans-serif" font-size="12" font-weight="400" fill="#999999">
    Branch: claude/inter-font-application-j4q8f1 | Commit: f63d7ce
  </text>
</svg>