<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Mascot on quest with map -->
  <g transform="translate(32, 32)">
    <!-- Map scroll -->
    <rect x="-8" y="-2" width="6" height="5" fill="#E8D5C4" stroke="#8B7355" stroke-width="0.5" rx="0.5"/>
    <!-- Map markings -->
    <circle cx="-6" cy="-0.5" r="0.8" fill="#FF6B6B" stroke="#E55100" stroke-width="0.4"/>
    <path d="M -6 -0.5 L -4 2" fill="none" stroke="#4A90E2" stroke-width="0.6"/>
    <!-- Head -->
    <circle cx="0" cy="-8" r="8" fill="#3E8E5E" stroke="#2E7048" stroke-width="0.5"/>
    <!-- Glasses -->
    <circle cx="-4" cy="-9" r="2.5" fill="none" stroke="#2E7048" stroke-width="1"/>
    <circle cx="4" cy="-9" r="2.5" fill="none" stroke="#2E7048" stroke-width="1"/>
    <line x1="-1.5" y1="-9" x2="1.5" y2="-9" stroke="#2E7048" stroke-width="1"/>
    <!-- Eyes adventurous -->
    <circle cx="-4" cy="-9.5" r="0.8" fill="#FFF"/>
    <circle cx="4" cy="-9.5" r="0.8" fill="#FFF"/>
    <!-- Determined smile -->
    <path d="M -2 -5 Q 0 -3.5 2 -5" fill="none" stroke="#2E7048" stroke-width="0.8" stroke-linecap="round"/>
    <!-- Body -->
    <rect x="-5" y="0" width="10" height="8" fill="#3E8E5E" stroke="#2E7048" stroke-width="0.5" rx="1"/>
  </g>
</svg>
