<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Mascot with network nodes -->
  <g transform="translate(32, 32)">
    <!-- Network nodes -->
    <circle cx="-6" cy="-14" r="1.2" fill="#4A90E2" stroke="#2563EB" stroke-width="0.5"/>
    <circle cx="0" cy="-16" r="1.2" fill="#3E8E5E" stroke="#2E7048" stroke-width="0.5"/>
    <circle cx="6" cy="-14" r="1.2" fill="#FF6B6B" stroke="#E55100" stroke-width="0.5"/>
    <!-- Network connections -->
    <line x1="-6" y1="-14" x2="0" y2="-16" stroke="#CDEAD8" stroke-width="0.6"/>
    <line x1="0" y1="-16" x2="6" y2="-14" stroke="#CDEAD8" stroke-width="0.6"/>
    <line x1="-6" y1="-14" x2="6" y2="-14" stroke="#CDEAD8" stroke-width="0.6"/>
    <!-- Head -->
    <circle cx="0" cy="-8" r="8" fill="#3E8E5E" stroke="#2E7048" stroke-width="0.5"/>
    <!-- Glasses -->
    <circle cx="-4" cy="-9" r="2.5" fill="none" stroke="#2E7048" stroke-width="1"/>
    <circle cx="4" cy="-9" r="2.5" fill="none" stroke="#2E7048" stroke-width="1"/>
    <line x1="-1.5" y1="-9" x2="1.5" y2="-9" stroke="#2E7048" stroke-width="1"/>
    <!-- Eyes connected -->
    <circle cx="-4" cy="-9" r="0.8" fill="#FFF"/>
    <circle cx="4" cy="-9" r="0.8" fill="#FFF"/>
    <!-- Smile -->
    <path d="M -2 -5 Q 0 -3.5 2 -5" fill="none" stroke="#2E7048" stroke-width="0.8" stroke-linecap="round"/>
    <!-- Body -->
    <rect x="-5" y="0" width="10" height="8" fill="#3E8E5E" stroke="#2E7048" stroke-width="0.5" rx="1"/>
  </g>
</svg>
