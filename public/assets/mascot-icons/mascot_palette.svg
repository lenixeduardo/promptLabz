<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Mascot artist with palette -->
  <g transform="translate(32, 32)">
    <!-- Palette in hand -->
    <ellipse cx="-7" cy="3" rx="3" ry="4" fill="#F5DEB3" stroke="#D2B48C" stroke-width="0.5"/>
    <!-- Paint dots on palette -->
    <circle cx="-8" cy="0" r="0.8" fill="#FF6B6B"/>
    <circle cx="-7" cy="5" r="0.8" fill="#4A90E2"/>
    <circle cx="-5.5" cy="2" r="0.8" fill="#FFD700"/>
    <!-- Paintbrush -->
    <line x1="-6" y1="2" x2="3" y2="-8" stroke="#8B4513" stroke-width="1.2" stroke-linecap="round"/>
    <circle cx="3.5" cy="-8.5" r="1" fill="#FFB6C1" stroke="#FF69B4" stroke-width="0.5"/>
    <!-- Head -->
    <circle cx="0" cy="-8" r="8" fill="#3E8E5E" stroke="#2E7048" stroke-width="0.5"/>
    <!-- Glasses -->
    <circle cx="-4" cy="-9" r="2.5" fill="none" stroke="#2E7048" stroke-width="1"/>
    <circle cx="4" cy="-9" r="2.5" fill="none" stroke="#2E7048" stroke-width="1"/>
    <line x1="-1.5" y1="-9" x2="1.5" y2="-9" stroke="#2E7048" stroke-width="1"/>
    <!-- Eyes creative -->
    <circle cx="-4" cy="-9" r="0.8" fill="#FFF"/>
    <circle cx="4" cy="-9" r="0.8" fill="#FFF"/>
    <!-- Creative expression -->
    <path d="M -2 -5 Q 0 -3.5 2 -5" fill="none" stroke="#2E7048" stroke-width="0.8" stroke-linecap="round"/>
    <!-- Body -->
    <rect x="-5" y="0" width="10" height="8" fill="#3E8E5E" stroke="#2E7048" stroke-width="0.5" rx="1"/>
  </g>
</svg>
