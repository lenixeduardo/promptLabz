<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Mascot with crown -->
  <g transform="translate(32, 32)">
    <!-- Crown -->
    <path d="M -8 -16 L -5 -19 L 0 -17 L 5 -19 L 8 -16" fill="#FFD700" stroke="#FFA500" stroke-width="0.5" stroke-linejoin="round"/>
    <line x1="-8" y1="-16" x2="8" y2="-16" stroke="#FFD700" stroke-width="1.5"/>
    <!-- Jewels -->
    <circle cx="-5" cy="-19" r="0.8" fill="#FF69B4" stroke="#FF1493" stroke-width="0.3"/>
    <circle cx="0" cy="-17" r="0.8" fill="#4A90E2" stroke="#2563EB" stroke-width="0.3"/>
    <circle cx="5" cy="-19" r="0.8" fill="#7C5CFF" stroke="#6A4CFF" stroke-width="0.3"/>
    <!-- Head -->
    <circle cx="0" cy="-8" r="8" fill="#3E8E5E" stroke="#2E7048" stroke-width="0.5"/>
    <!-- Glasses -->
    <circle cx="-4" cy="-9" r="2.5" fill="none" stroke="#2E7048" stroke-width="1"/>
    <circle cx="4" cy="-9" r="2.5" fill="none" stroke="#2E7048" stroke-width="1"/>
    <line x1="-1.5" y1="-9" x2="1.5" y2="-9" stroke="#2E7048" stroke-width="1"/>
    <!-- Eyes regal -->
    <circle cx="-4" cy="-9" r="0.8" fill="#FFF"/>
    <circle cx="4" cy="-9" r="0.8" fill="#FFF"/>
    <!-- Confident smile -->
    <path d="M -3 -5.5 Q 0 -3.5 3 -5.5" fill="none" stroke="#2E7048" stroke-width="0.8" stroke-linecap="round"/>
    <!-- Body -->
    <rect x="-5" y="0" width="10" height="8" fill="#3E8E5E" stroke="#2E7048" stroke-width="0.5" rx="1"/>
  </g>
</svg>
