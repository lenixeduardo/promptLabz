<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Mascot thinking with brain -->
  <g transform="translate(32, 32)">
    <!-- Brain thought -->
    <circle cx="7" cy="-15" r="2.5" fill="#9B59B6" stroke="#8E44AD" stroke-width="0.5"/>
    <circle cx="9" cy="-12" r="1.8" fill="#9B59B6" stroke="#8E44AD" stroke-width="0.5"/>
    <!-- Thought connector -->
    <path d="M 6 -12 Q 6.5 -11 6.5 -10" fill="none" stroke="#9B59B6" stroke-width="0.6" stroke-linecap="round"/>
    <!-- Head -->
    <circle cx="0" cy="-8" r="8" fill="#3E8E5E" stroke="#2E7048" stroke-width="0.5"/>
    <!-- Glasses -->
    <circle cx="-4" cy="-9" r="2.5" fill="none" stroke="#2E7048" stroke-width="1"/>
    <circle cx="4" cy="-9" r="2.5" fill="none" stroke="#2E7048" stroke-width="1"/>
    <line x1="-1.5" y1="-9" x2="1.5" y2="-9" stroke="#2E7048" stroke-width="1"/>
    <!-- Eyes thinking upward -->
    <circle cx="-4" cy="-9.5" r="0.8" fill="#FFF"/>
    <circle cx="4" cy="-9.5" r="0.8" fill="#FFF"/>
    <!-- Thoughtful expression -->
    <path d="M -2 -5 Q 0 -6 2 -5" fill="none" stroke="#2E7048" stroke-width="0.8" stroke-linecap="round"/>
    <!-- Body -->
    <rect x="-5" y="0" width="10" height="8" fill="#3E8E5E" stroke="#2E7048" stroke-width="0.5" rx="1"/>
  </g>
</svg>
