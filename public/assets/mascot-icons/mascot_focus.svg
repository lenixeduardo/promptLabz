<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Mascot in focused mode -->
  <g transform="translate(32, 32)">
    <!-- Focus indicator -->
    <rect x="-10" y="-14" width="20" height="12" fill="none" stroke="#4A90E2" stroke-width="1" rx="2" stroke-dasharray="2,2"/>
    <!-- Head -->
    <circle cx="0" cy="-8" r="8" fill="#3E8E5E" stroke="#2E7048" stroke-width="0.5"/>
    <!-- Glasses with shine -->
    <circle cx="-4" cy="-9" r="2.5" fill="none" stroke="#2E7048" stroke-width="1"/>
    <circle cx="4" cy="-9" r="2.5" fill="none" stroke="#2E7048" stroke-width="1"/>
    <line x1="-1.5" y1="-9" x2="1.5" y2="-9" stroke="#2E7048" stroke-width="1"/>
    <!-- Glasses shine -->
    <circle cx="-5" cy="-10.5" r="0.6" fill="#B0E0E6"/>
    <circle cx="3" cy="-10.5" r="0.6" fill="#B0E0E6"/>
    <!-- Eyes laser focused -->
    <circle cx="-4" cy="-9" r="0.6" fill="#FF0000" opacity="0.7"/>
    <circle cx="4" cy="-9" r="0.6" fill="#FF0000" opacity="0.7"/>
    <!-- Determined mouth -->
    <line x1="-2" y1="-5.5" x2="2" y2="-5.5" stroke="#2E7048" stroke-width="0.8" stroke-linecap="round"/>
    <!-- Body -->
    <rect x="-5" y="0" width="10" height="8" fill="#3E8E5E" stroke="#2E7048" stroke-width="0.5" rx="1"/>
  </g>
</svg>
