<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Mascot celebrating -->
  <g transform="translate(32, 32)">
    <!-- Confetti left -->
    <rect x="-10" y="-18" width="2" height="3" fill="#FF6B6B" stroke="#E55100" stroke-width="0.3" transform="rotate(-30 -9 -16.5)"/>
    <!-- Confetti right -->
    <rect x="8" y="-18" width="2" height="3" fill="#FFD700" stroke="#FFA500" stroke-width="0.3" transform="rotate(30 9 -16.5)"/>
    <!-- Confetti center -->
    <circle cx="0" cy="-16" r="0.8" fill="#7C5CFF"/>
    <!-- Head -->
    <circle cx="0" cy="-8" r="8" fill="#3E8E5E" stroke="#2E7048" stroke-width="0.5"/>
    <!-- Glasses -->
    <circle cx="-4" cy="-9" r="2.5" fill="none" stroke="#2E7048" stroke-width="1"/>
    <circle cx="4" cy="-9" r="2.5" fill="none" stroke="#2E7048" stroke-width="1"/>
    <line x1="-1.5" y1="-9" x2="1.5" y2="-9" stroke="#2E7048" stroke-width="1"/>
    <!-- Eyes celebrating -->
    <circle cx="-4" cy="-9.5" r="0.8" fill="#FFF"/>
    <circle cx="4" cy="-9.5" r="0.8" fill="#FFF"/>
    <!-- Big happy smile -->
    <path d="M -3 -4 Q 0 -2 3 -4" fill="none" stroke="#2E7048" stroke-width="1" stroke-linecap="round"/>
    <!-- Body -->
    <rect x="-5" y="0" width="10" height="8" fill="#3E8E5E" stroke="#2E7048" stroke-width="0.5" rx="1"/>
    <!-- Arms up in celebration -->
    <line x1="-5" y1="2" x2="-8" y2="-3" stroke="#3E8E5E" stroke-width="1.2" stroke-linecap="round"/>
    <line x1="5" y1="2" x2="8" y2="-3" stroke="#3E8E5E" stroke-width="1.2" stroke-linecap="round"/>
  </g>
</svg>
