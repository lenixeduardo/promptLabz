<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Mascot with growing chart -->
  <g transform="translate(32, 32)">
    <!-- Chart bars -->
    <rect x="-7" y="2" width="2" height="2" fill="#4A90E2" stroke="#2563EB" stroke-width="0.5"/>
    <rect x="-3.5" y="1" width="2" height="3" fill="#3E8E5E" stroke="#2E7048" stroke-width="0.5"/>
    <rect x="0" y="0" width="2" height="4" fill="#FFD700" stroke="#FFA500" stroke-width="0.5"/>
    <rect x="3.5" y="-1" width="2" height="5" fill="#FF6B6B" stroke="#E55100" stroke-width="0.5"/>
    <!-- Upward trend line -->
    <polyline points="-6,2 -2,1 2,0 6,-1" fill="none" stroke="#3E8E5E" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Head -->
    <circle cx="0" cy="-8" r="8" fill="#3E8E5E" stroke="#2E7048" stroke-width="0.5"/>
    <!-- Glasses -->
    <circle cx="-4" cy="-9" r="2.5" fill="none" stroke="#2E7048" stroke-width="1"/>
    <circle cx="4" cy="-9" r="2.5" fill="none" stroke="#2E7048" stroke-width="1"/>
    <line x1="-1.5" y1="-9" x2="1.5" y2="-9" stroke="#2E7048" stroke-width="1"/>
    <!-- Eyes focused on growth -->
    <circle cx="-4" cy="-9" r="0.8" fill="#FFF"/>
    <circle cx="4" cy="-9" r="0.8" fill="#FFF"/>
    <!-- Confident smile -->
    <path d="M -3 -5.5 Q 0 -3.5 3 -5.5" fill="none" stroke="#2E7048" stroke-width="0.8" stroke-linecap="round"/>
    <!-- Body -->
    <rect x="-5" y="0" width="10" height="8" fill="#3E8E5E" stroke="#2E7048" stroke-width="0.5" rx="1"/>
  </g>
</svg>
