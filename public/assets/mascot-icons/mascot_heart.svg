<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Mascot with heart -->
  <g transform="translate(32, 32)">
    <!-- Heart -->
    <path d="M 6 -16 Q 9 -16 9 -13 Q 9 -10 6 -8 Q 3 -10 3 -13 Q 3 -16 6 -16" fill="#FF69B4" stroke="#FF1493" stroke-width="0.5"/>
    <!-- Head -->
    <circle cx="0" cy="-8" r="8" fill="#3E8E5E" stroke="#2E7048" stroke-width="0.5"/>
    <!-- Glasses -->
    <circle cx="-4" cy="-9" r="2.5" fill="none" stroke="#2E7048" stroke-width="1"/>
    <circle cx="4" cy="-9" r="2.5" fill="none" stroke="#2E7048" stroke-width="1"/>
    <line x1="-1.5" y1="-9" x2="1.5" y2="-9" stroke="#2E7048" stroke-width="1"/>
    <!-- Eyes happy -->
    <circle cx="-4" cy="-9" r="0.8" fill="#FFF"/>
    <circle cx="4" cy="-9" r="0.8" fill="#FFF"/>
    <!-- Happy smile -->
    <path d="M -3 -5 Q 0 -3.5 3 -5" fill="none" stroke="#2E7048" stroke-width="0.8" stroke-linecap="round"/>
    <!-- Body -->
    <rect x="-5" y="0" width="10" height="8" fill="#3E8E5E" stroke="#2E7048" stroke-width="0.5" rx="1"/>
  </g>
</svg>
