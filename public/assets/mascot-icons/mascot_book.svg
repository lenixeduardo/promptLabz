<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Mascot with book -->
  <g transform="translate(32, 32)">
    <!-- Head circle -->
    <circle cx="0" cy="-8" r="8" fill="#3E8E5E" stroke="#2E7048" stroke-width="0.5"/>
    <!-- Glasses left -->
    <circle cx="-4" cy="-9" r="2.5" fill="none" stroke="#2E7048" stroke-width="1"/>
    <!-- Glasses right -->
    <circle cx="4" cy="-9" r="2.5" fill="none" stroke="#2E7048" stroke-width="1"/>
    <!-- Glasses bridge -->
    <line x1="-1.5" y1="-9" x2="1.5" y2="-9" stroke="#2E7048" stroke-width="1"/>
    <!-- Eyes -->
    <circle cx="-4" cy="-9" r="0.8" fill="#FFF"/>
    <circle cx="4" cy="-9" r="0.8" fill="#FFF"/>
    <!-- Smile -->
    <path d="M -3 -6 Q 0 -4.5 3 -6" fill="none" stroke="#2E7048" stroke-width="0.8" stroke-linecap="round"/>
    <!-- Body -->
    <rect x="-5" y="0" width="10" height="8" fill="#3E8E5E" stroke="#2E7048" stroke-width="0.5" rx="1"/>
    <!-- Book in hands -->
    <rect x="-7" y="2" width="4" height="6" fill="#8B4513" stroke="#654321" stroke-width="0.5"/>
    <rect x="3" y="2" width="4" height="6" fill="#8B4513" stroke="#654321" stroke-width="0.5"/>
    <!-- Book pages -->
    <line x1="-5" y1="2" x2="-5" y2="8" stroke="#FFF" stroke-width="0.4"/>
    <line x1="5" y1="2" x2="5" y2="8" stroke="#FFF" stroke-width="0.4"/>
  </g>
</svg>
