<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Mascot with medal -->
  <g transform="translate(32, 32)">
    <!-- Medal ribbon -->
    <line x1="-1" y1="-18" x2="-1" y2="-12" stroke="#FF0000" stroke-width="1.2"/>
    <line x1="1" y1="-18" x2="1" y2="-12" stroke="#FF0000" stroke-width="1.2"/>
    <!-- Medal -->
    <circle cx="0" cy="-11" r="3" fill="#FFD700" stroke="#FFA500" stroke-width="0.5"/>
    <circle cx="0" cy="-11" r="2" fill="none" stroke="#FFA500" stroke-width="0.6"/>
    <!-- Medal star -->
    <polygon points="0,-13 0.5,-11.5 2,-11.5 1,-10.5 1.5,-9 0,-10 -1.5,-9 -1,-10.5 -2,-11.5 -0.5,-11.5" fill="#FFA500" stroke="#FFD700" stroke-width="0.3"/>
    <!-- Head -->
    <circle cx="0" cy="-8" r="8" fill="#3E8E5E" stroke="#2E7048" stroke-width="0.5"/>
    <!-- Glasses -->
    <circle cx="-4" cy="-9" r="2.5" fill="none" stroke="#2E7048" stroke-width="1"/>
    <circle cx="4" cy="-9" r="2.5" fill="none" stroke="#2E7048" stroke-width="1"/>
    <line x1="-1.5" y1="-9" x2="1.5" y2="-9" stroke="#2E7048" stroke-width="1"/>
    <!-- Eyes proud -->
    <circle cx="-4" cy="-9" r="0.8" fill="#FFF"/>
    <circle cx="4" cy="-9" r="0.8" fill="#FFF"/>
    <!-- Smile -->
    <path d="M -3 -5.5 Q 0 -4 3 -5.5" fill="none" stroke="#2E7048" stroke-width="0.8" stroke-linecap="round"/>
    <!-- Body -->
    <rect x="-5" y="0" width="10" height="8" fill="#3E8E5E" stroke="#2E7048" stroke-width="0.5" rx="1"/>
  </g>
</svg>
