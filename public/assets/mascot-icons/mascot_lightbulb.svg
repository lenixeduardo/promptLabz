<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Mascot with lightbulb idea -->
  <g transform="translate(32, 32)">
    <!-- Lightbulb above -->
    <circle cx="0" cy="-18" r="3" fill="#FFD700" stroke="#FFA500" stroke-width="0.5"/>
    <path d="M -2.2 -15 Q -2.5 -12 0 -12 Q 2.5 -12 2.2 -15" fill="none" stroke="#D4A500" stroke-width="0.8"/>
    <!-- Spark lines -->
    <line x1="0" y1="-22" x2="0" y2="-21" stroke="#FFD700" stroke-width="1" stroke-linecap="round"/>
    <line x1="4" y1="-20" x2="4.5" y2="-19.5" stroke="#FFD700" stroke-width="1" stroke-linecap="round"/>
    <!-- Head -->
    <circle cx="0" cy="-8" r="8" fill="#3E8E5E" stroke="#2E7048" stroke-width="0.5"/>
    <!-- Glasses -->
    <circle cx="-4" cy="-9" r="2.5" fill="none" stroke="#2E7048" stroke-width="1"/>
    <circle cx="4" cy="-9" r="2.5" fill="none" stroke="#2E7048" stroke-width="1"/>
    <line x1="-1.5" y1="-9" x2="1.5" y2="-9" stroke="#2E7048" stroke-width="1"/>
    <!-- Eyes looking up at idea -->
    <circle cx="-4" cy="-9.5" r="0.8" fill="#FFF"/>
    <circle cx="4" cy="-9.5" r="0.8" fill="#FFF"/>
    <!-- Excited mouth -->
    <path d="M -2 -5 Q 0 -3.5 2 -5" fill="none" stroke="#2E7048" stroke-width="0.8" stroke-linecap="round"/>
    <!-- Body -->
    <rect x="-5" y="0" width="10" height="8" fill="#3E8E5E" stroke="#2E7048" stroke-width="0.5" rx="1"/>
  </g>
</svg>
