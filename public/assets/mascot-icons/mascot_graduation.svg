<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Mascot with graduation cap -->
  <g transform="translate(32, 32)">
    <!-- Graduation cap -->
    <line x1="-10" y1="-17" x2="10" y2="-17" stroke="#2E7048" stroke-width="1" stroke-linecap="round"/>
    <rect x="-10" y="-17" width="20" height="2.5" fill="#3E8E5E" stroke="#2E7048" stroke-width="0.5"/>
    <!-- Tassel -->
    <line x1="0" y1="-14.5" x2="0" y2="-8" stroke="#FFD700" stroke-width="1"/>
    <circle cx="0" cy="-7.5" r="1" fill="#FFD700"/>
    <!-- Head -->
    <circle cx="0" cy="-8" r="8" fill="#3E8E5E" stroke="#2E7048" stroke-width="0.5"/>
    <!-- Glasses -->
    <circle cx="-4" cy="-9" r="2.5" fill="none" stroke="#2E7048" stroke-width="1"/>
    <circle cx="4" cy="-9" r="2.5" fill="none" stroke="#2E7048" stroke-width="1"/>
    <line x1="-1.5" y1="-9" x2="1.5" y2="-9" stroke="#2E7048" stroke-width="1"/>
    <!-- Eyes -->
    <circle cx="-4" cy="-9" r="0.8" fill="#FFF"/>
    <circle cx="4" cy="-9" r="0.8" fill="#FFF"/>
    <!-- Happy expression -->
    <path d="M -3 -6 Q 0 -4.5 3 -6" fill="none" stroke="#2E7048" stroke-width="0.8" stroke-linecap="round"/>
    <!-- Body -->
    <rect x="-5" y="0" width="10" height="8" fill="#3E8E5E" stroke="#2E7048" stroke-width="0.5" rx="1"/>
  </g>
</svg>
