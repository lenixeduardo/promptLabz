<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Mascot with puzzle piece -->
  <g transform="translate(32, 32)">
    <!-- Head -->
    <circle cx="0" cy="-8" r="8" fill="#3E8E5E" stroke="#2E7048" stroke-width="0.5"/>
    <!-- Glasses -->
    <circle cx="-4" cy="-9" r="2.5" fill="none" stroke="#2E7048" stroke-width="1"/>
    <circle cx="4" cy="-9" r="2.5" fill="none" stroke="#2E7048" stroke-width="1"/>
    <line x1="-1.5" y1="-9" x2="1.5" y2="-9" stroke="#2E7048" stroke-width="1"/>
    <!-- Eyes thinking -->
    <circle cx="-4" cy="-9" r="0.8" fill="#FFF"/>
    <circle cx="4" cy="-9" r="0.8" fill="#FFF"/>
    <!-- Thoughtful mouth -->
    <path d="M -2 -5.5 Q 0 -6.5 2 -5.5" fill="none" stroke="#2E7048" stroke-width="0.8" stroke-linecap="round"/>
    <!-- Body -->
    <rect x="-5" y="0" width="10" height="8" fill="#3E8E5E" stroke="#2E7048" stroke-width="0.5" rx="1"/>
    <!-- Puzzle pieces in hand -->
    <rect x="-7" y="2" width="2.5" height="2.5" fill="#4A90E2" stroke="#2563EB" stroke-width="0.5"/>
    <rect x="-3.5" y="5" width="2.5" height="2.5" fill="#7C5CFF" stroke="#6A4CFF" stroke-width="0.5"/>
    <rect x="4.5" y="2" width="2.5" height="2.5" fill="#F97316" stroke="#EA580C" stroke-width="0.5"/>
  </g>
</svg>
