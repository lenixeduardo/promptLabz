<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Mascot launching rocket -->
  <g transform="translate(32, 32)">
    <!-- Rocket body -->
    <rect x="5" y="-15" width="4" height="12" fill="#FF6B35" stroke="#E55100" stroke-width="0.5" rx="2"/>
    <!-- Rocket cone -->
    <polygon points="7,5 5,8 9,8" fill="#FFD700" stroke="#FFA500" stroke-width="0.5"/>
    <!-- Rocket fins -->
    <polygon points="5,2 3,5 4,2" fill="#3E8E5E" stroke="#2E7048" stroke-width="0.5"/>
    <polygon points="9,2 11,5 10,2" fill="#3E8E5E" stroke="#2E7048" stroke-width="0.5"/>
    <!-- Rocket window -->
    <circle cx="7" cy="-10" r="1.5" fill="#87CEEB" stroke="#4A90E2" stroke-width="0.5"/>
    <!-- Head -->
    <circle cx="0" cy="-8" r="8" fill="#3E8E5E" stroke="#2E7048" stroke-width="0.5"/>
    <!-- Glasses -->
    <circle cx="-4" cy="-9" r="2.5" fill="none" stroke="#2E7048" stroke-width="1"/>
    <circle cx="4" cy="-9" r="2.5" fill="none" stroke="#2E7048" stroke-width="1"/>
    <line x1="-1.5" y1="-9" x2="1.5" y2="-9" stroke="#2E7048" stroke-width="1"/>
    <!-- Eyes excited about rocket -->
    <circle cx="-4" cy="-9.5" r="0.8" fill="#FFF"/>
    <circle cx="4" cy="-9.5" r="0.8" fill="#FFF"/>
    <!-- Excited mouth -->
    <path d="M -2 -5 Q 0 -3 2 -5" fill="none" stroke="#2E7048" stroke-width="0.8" stroke-linecap="round"/>
    <!-- Body -->
    <rect x="-5" y="0" width="10" height="8" fill="#3E8E5E" stroke="#2E7048" stroke-width="0.5" rx="1"/>
  </g>
</svg>
