name: Skills & Prompts Sync

on:
  schedule:
    - cron: '0 8 */3 * *'   # Every 3 days at 08:00 UTC
  workflow_dispatch:          # Allow manual trigger from GitHub UI

permissions:
  contents: write             # Needed to commit vault files

jobs:
  sync:
    name: Sync skills & prompts, update vault
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Trigger skills-prompts-sync Edge Function
        id: sync
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SKILLS_SYNC_SECRET: ${{ secrets.SKILLS_SYNC_SECRET }}
        run: |
          FUNCTION_URL="${SUPABASE_URL%/}/functions/v1/skills-prompts-sync"
          echo "→ POST $FUNCTION_URL"

          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${SKILLS_SYNC_SECRET}" \
            -H "Content-Type: application/json" \
            --max-time 90 \
            "$FUNCTION_URL")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)

          echo "← HTTP $HTTP_CODE"
          echo "$BODY"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Edge Function returned $HTTP_CODE"
            exit 1
          fi

          SKILLS=$(echo "$BODY" | grep -o '"inserted":[0-9]*' | head -1 | grep -o '[0-9]*' || echo "0")
          PROMPTS=$(echo "$BODY" | grep -o '"inserted":[0-9]*' | tail -1 | grep -o '[0-9]*' || echo "0")
          echo "::notice::Skills inserted: $SKILLS | Prompts inserted: $PROMPTS"

      - name: Generate Obsidian vault
        id: vault
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          node routines/skills-prompts-sync/generate-vault.mjs
          echo "vault_exit=$?" >> "$GITHUB_OUTPUT"
        # Exit code 2 means files were written; 0 means nothing changed; 1 is error
        continue-on-error: true

      - name: Commit vault changes
        if: steps.vault.outcome == 'success' || steps.vault.outputs.vault_exit == '2'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add vault/
          if git diff --cached --quiet; then
            echo "No vault changes to commit."
          else
            git commit -m "chore(vault): sync skills & prompts — $(date -u '+%Y-%m-%d')"
            git push
            echo "::notice::Vault committed and pushed."
          fi
