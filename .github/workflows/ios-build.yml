name: iOS Build

# Compila o app iOS em runner macOS do GitHub — não é necessário ter um Mac.
#
# Modos:
#   - validate (padrão): compila sem assinatura de código. Valida que o projeto
#     iOS builda de ponta a ponta. Não exige conta Apple Developer.
#   - ipa: gera um .ipa assinado para distribuição (TestFlight/App Store).
#     Exige conta Apple Developer (US$ 99/ano) e os secrets:
#       IOS_CERTIFICATE_BASE64   — certificado de distribuição .p12 em base64
#       IOS_CERTIFICATE_PASSWORD — senha do .p12
#       IOS_PROVISIONING_PROFILE_BASE64 — provisioning profile em base64
#       APPLE_TEAM_ID            — Team ID da conta Apple Developer
#
# Nota: em repositórios privados, minutos de runner macOS contam 10x no plano
# gratuito — por isso este workflow roda apenas manualmente ou em tags.

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Modo de build'
        required: true
        default: 'validate'
        type: choice
        options:
          - validate
          - ipa
  push:
    tags:
      - 'v*'

jobs:
  build-ios:
    name: Build iOS
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      # ── Modo validate: build sem assinatura ────────────────────────────
      - name: Build (sem assinatura)
        if: github.event.inputs.mode != 'ipa' && !startsWith(github.ref, 'refs/tags/v')
        run: |
          xcodebuild build \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO

      # ── Modo ipa: assinatura + archive + export ────────────────────────
      - name: Importar certificado e provisioning profile
        if: github.event.inputs.mode == 'ipa' || startsWith(github.ref, 'refs/tags/v')
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          if [ -z "$IOS_CERTIFICATE_BASE64" ]; then
            echo "::error::Secrets de assinatura iOS não configurados (IOS_CERTIFICATE_BASE64 etc). Veja o cabeçalho deste workflow."
            exit 1
          fi
          CERT_PATH=$RUNNER_TEMP/dist.p12
          PROFILE_PATH=$RUNNER_TEMP/app.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain-db
          KEYCHAIN_PASSWORD=$(uuidgen)

          echo -n "$IOS_CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"
          echo -n "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$IOS_CERTIFICATE_PASSWORD" -A \
            -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(/usr/libexec/PlistBuddy -c 'Print :UUID' /dev/stdin <<< "$(security cms -D -i "$PROFILE_PATH")")
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID".mobileprovision

      - name: Archive e export IPA
        if: github.event.inputs.mode == 'ipa' || startsWith(github.ref, 'refs/tags/v')
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          xcodebuild archive \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            -allowProvisioningUpdates

          cat > $RUNNER_TEMP/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store-connect</string>
            <key>teamID</key><string>$APPLE_TEAM_ID</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export

      - name: Upload IPA
        if: github.event.inputs.mode == 'ipa' || startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: promptlabz-ios-${{ github.run_number }}
          path: ${{ runner.temp }}/export/*.ipa
          retention-days: 90
